<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Navbar -->
     <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="index.html">Upgrad Events</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link active" href="events.html">Events</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact Us</a>
                    </li>

                    <li class="nav-item">
                        <button class="btn btn-logout" onclick="logout()">Logout</button>
                    </li>

                </ul>

            </div>
        </div>
     </nav>

     <div class="container mt-4">

        <h3 class="mb-4">Add New Event</h3> 

        <form id="eventForm">

            <div class="row">
                
                <div class="col-md-4 mb-3">
                    <input type="text" id="eventId" class="form-control" placeholder="Event ID" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text" id="eventName" class="form-control" placeholder="Event Name" required>
                </div>

                <div class="col-md-4 mb-3">
                    <select type="text" id="eventCategory" class="form-control" required>

                        <option value="">Select Category</option>
                        <option>Tech & Innovations</option> 
                        <option>Industrial Events</option>
                        <option>Artificial Intelligence</option>
                        <option>Cybersecurity</option>
                        <option>Cloud Computing</option>
                        <option>Startup & Entrepreneurship</option>
                        <option>Digital Marketing</option>
                        <option>Career Development</option>

                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="date" id="eventDate" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <input type="text" id="eventTime" class="form-control" placeholder="HH:MM (e.g. 14:30)" required pattern="^([01]\d|2[0-3]):([0-5]\d)$">
                </div>

                <div class="col-md-4 mb-3">
                    <input type="url" id="eventURL" class="form-control" placeholder="Event URL" required>
                </div>

            </div>

            <button class="btn btn-primary">Add Event</button>

        </form>

     </div>

     <!-- Event List -->

     <div class="container mt-5">

        <h3 class="mb-3">Search Events</h3>

        <div class="row">
            
            <div class="col-md-10">
                <input type="text" id="searchInput" class="form-control" placeholder="Serach by ID, Name, or Category">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="triggerSearch()">
                    Search
                </button>
            </div>

        </div>
        <br>
        
        <h3 class="mb-4">Event List</h3>

        <div class="row" id="eventsContainer"></div>

     </div>

    <!-- Toast Messages -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="appToast" class="toast align-items-center custom-toast border-0" role="alert">

            <div class="d-flex">

                <div class="toast-body" id="toastMessage">
                    Message
                </div>

                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

            </div>

        </div>
        
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

        <div class="modal-header">
            <h5 class="modal-title">Confirm Delete</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
            Are you sure you want to delete this event?
        </div>

        <div class="modal-footer">

            <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cancel
            </button>

            <button class="btn btn-danger" id="confirmDeleteBtn">
            Delete
            </button>

        </div>

    </div>

</div>

</div>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>

    <!-- Scripts -->
     <script src="js/db.js"></script>
     <script src="js/events.js"></script>
     <script src="js/toast.js"></script>
     <script>
        window.addEventListener("pageshow",function(event){

            if(!sessionStorage.getItem("adminLoggedIn")){

                window.location.href = "login.html";

            }
        });
     </script>
</body>
</html>
