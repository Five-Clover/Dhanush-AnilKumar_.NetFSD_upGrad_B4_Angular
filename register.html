<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
          crossorigin="anonymous">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Navbar -->
     <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="index.html">Upgrad Events</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="events.html">Events</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact Us</a>
                    </li>

                </ul>

            </div>
        </div>
     </nav>

    <div class="container mt-5">

        <h3 class="mb-4">Event Registration</h3>    

        <!-- Event Details -->

        <div class="card p-3 mb-4">

            <p><strong>Event ID: </strong><span id="eventId"></span></p>
            <p><strong>Event Name: </strong><span id="eventName"></span></p>
            <p><strong>Category: </strong><span id="eventCategory"></span></p>
            <p><strong>Date: </strong><span id="eventDate"></span></p>
            <p><strong>Time: </strong><span id="eventTime"></span></p>

        </div>

        <!-- Registration Form -->
        <form id="registrationForm">

            <div class="mb-3">
                <label>First Name</label>
                <input type="text" id="firstName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Last Name</label>
                <input type="text" id="lastName" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="text" id="email" class="form-control" required>
            </div>

            <button class="btn btn-primary">Register</button>

        </form>

    </div>

    <!-- Toast Messages -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="appToast" class="toast align-items-center custom-toast border-0" role="alert">

            <div class="d-flex">

                <div class="toast-body" id="toastMessage">
                    Message
                </div>

                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

            </div>

        </div>
        
    </div>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
    
    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/register.js"></script>
    <script src="js/toast.js"></script>
</body>
</html>
